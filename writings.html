actice.\n\nI feel like today I really needed to let some steam off..\nI'm a young progressist and reviolutionary guy (at least I think I am) and yesterday was a really bad day compared to the rest. Femtogo, one of my favorite artists in France just told the whole community that he raped a 15yo and that he consumed pedopornographic videos. It took a huge toll on me since he was the only artist in french music history to talk about his rape when he was a kid and his homosexuality. Really, it did so much for the whole community and we could litteraly see the brightest of futures for him and Ptite Soeur. And yet, Femtogo was not able to break the viscious cycle he was in and perpetuated the same violent atrocity he suffered through as a kid to an innocent soul. Truly the worst end to an up and coming powerhouse of rap in France. An absolutely discusting story that will take some time for the community to recover from.\n\nSo yeah, yesterday was a hard day, despite spending some awesome time helping my friend Fanga get to his new appartment in Friedrieschain. But today is a new day you know, I try to take care of myself, I ate, I played minecraft, I'm hard coding this little website rn and I'm having fun.\n\nSo let's see what tomorrow has to offer for me, I think it's going to be a great day. :P"])</script><script>self.__next_f.push([1,"11:T1926,"])</script><script>self.__next_f.push([1,"---\ntitle: \"Art et ouverture d'esprit\"\ndate: \"2026-03-08\"\ndescription: \"Comprends la corélation entre la critique et ses dérives fascistes.\"\ntags: [\"politique\", \"grandir\", \"maturité\"]\n---\n\nMon parcours avec la musique est somme toute des plus banals hein, c'est juste rare d'être tombé sur un mec qui s'est autant ingurgité de contenu en si peu de temps.\nMais laissez-moi vous le résumer quand même :\n\nJ'ai grandi dans une famille où la musique est une partie intégrante de la vie de tous les jours. J'ai grandi dans une dualité et un conflit de cultures entre la famille de ma mère et celle de mon père qui m'ont beaucoup forgé et dont j'estime avoir pris le meilleur des deux mondes. Mais concentrons-nous plus particulièrement sur le côté de mon père. Une famille musicale donc, dans laquelle il y avait une règle que j'ai toujours adorée : si tu te réveilles parce que les autres font trop de bruit ou mettent le son trop fort, tu n'as pas à te plaindre ni à empêcher les autres de vivre. Et Dieu sait le nombre de matins où je me suis réveillé sous du gros AC/DC à 8h et où, dix minutes après, j'étais dans la piscine mdrrr. Dans mon adolescence, tous les soirs après manger mon père et moi écoutions des lives et discutions d'artistes et de sons qui nous ont beaucoup marqués. C'est dans ce contexte que j'ai pu faire émerger une relation très forte avec la musique. C'est à travers elle que je ressentais le plus de choses et je passais mon temps à chercher ce nouveau sentiment d'extase à la découverte d'un nouvel artiste qui me fait redécouvrir un genre entier. En y repensant plus profondément, je pense que j'ai un peu tout mélangé et que mon sens de la perfection que je cherchais à trouver dans cette musique était un peu toxique.\n\nPour recontextualiser cette pensée, il faut savoir que j'ai grandi dans une famille constamment dans le jugement : une famille anti-vax, anti-avortement, anti beaucoup de choses en fait. J'ai longuement cherché à comprendre la psychologie de ma famille et c'est un mix très fort d'amour et de haine viscérale. Avec ma sœur, on n'a manqué de rien, mais quelque chose que je pourrais leur reprocher c'est d'avoir beaucoup grandi dans la haine et la violence, aussi inconscientes soient-elles. Nombre de repas de famille se sont terminés sur une note d'amertume et d'angoisse due à la situation mondiale. Une espèce de brouillard paranoïaque s'est peu à peu installé, bien qu'infime comparé à l'amour que nos parents nous ont donné; évidemment. J'en viens donc à ma relation avec la musique que j'ai peu à peu assimilée avec cette violence-là. Un des moments marquants de mon adolescence a été de supprimer les réseaux sociaux pendant un mois et d'écouter 100 albums que j'avais trouvés sur Rate Your Music. Je venais de tomber dans le rabbit hole d'Anthony Fantano et j'ai commencé à objectifier la musique, dans le sens où la technicité et l'unique prenaient plus de place que le sentiment procuré par la musique elle-même. J'ai pris beaucoup de temps à m'en défaire, à me défaire de la classification objective (qui ne l'était pas du tout hein au final) des musiques que j'écoutais et j'en parlais beaucoup aux gens. Pour moi, rien n'était pire dans ce monde que d'écouter du JUL ou Aya Nakamura, vous voyez. Mais j'ai pu changer ce ressentiment grâce à ma politisation. Il y a eu plusieurs événements dans ma vie qui m'ont permis de m'émanciper de mes parents, de ce qu'ils représentaient pour moi et de toute cette négativité que j'ai pu comprendre au fur et à mesure.\n\nJ'ai pu donc, en quelque sorte, désostraciser la musique et tous les sujets sur lesquels une haine — qui n'était pas la mienne — agissait. On parle ici de racisme, de xénophobie, de paranoïa, de spéculations, de ressentiments et surtout de ce que j'appelais à l'époque la médiocrité. En somme, tout (et surtout l'art) qui n'était ni nouveau, ni unique, ni fort. Sauf que ça ne s'alignait pas avec mes valeurs, surtout celle de l'acceptation de l'autre qui a toujours été ancrée en moi, et qui a été en contradiction avec tout ce que mes parents m'ont inconsciemment appris. Le fait de devenir vraiment un artiste a aussi beaucoup changé ma vision de la chose car je sais maintenant ce que c'est de créer réellement. Le fait de copier ton prochain pour trouver sa patte, aussi minime et bénigne soit-elle, fait partie intégrante de la création. Combien de fois dans mon travail je me suis repris à juste copy-paste un design parce que je le trouvais incroyable. Il n'y avait rien de nouveau là-dedans et pourtant c'est aussi comme ça que l'inspiration et l'ingéniosité interviennent. Elles se manifestent en baignant dans un monde façonné par des copies sur lesquelles on a réitéré indéfiniment. Et bien je me suis aussi rendu compte que l'art commercial fait aussi partie de ce processus de création. Qu'Aya Nakamura a tout autant de valeur intrinsèque dans le monde de la création que 23wa. Car elle-même est source d'inspiration pour son/sa prochain(e) tout autant qu'un artiste, tel que 23wa, aussi unique soit-il.\n\nC'est donc avec cette nouvelle vision des choses qui peu à peu s'est ancrée en moi que j'ai commencé à vraiment apprécier de la musique que je n'aurais pas du tout aimée à l'époque. Je trouve une beauté incommensurable dans le travail de Theodora, Yame ou Ino Casablanca que j'aurais tout simplement détesté avant. Peut-être un résidu gêné de racisme, de jalousie ou tout simplement de la haine du différent, du non conventionnel qui ne fait VRAIMENT pas partie de ma culture (et en ça je souligne culture blanche évidemment). Car paradoxalement j'ai toujours été attiré par le non conventionnel, mais quand ça parlait trop de sujets trop légers ou que la musique n'était pas assez unique ou européenne, eh bien je n'aimais pas finalement. Cette vraie réalisation est arrivée quand j'ai découvert ce live d'Aya Nakamura: https://www.youtube.com/watch?v=6hrHndpEelU\u0026list=RD6hrHndpEelU\u0026start_radio=1. Une performance absolument magnifique faite par une artiste que je détestais et que j'ai appris à accepter en m'ouvrant à d'autres codes. Je pense qu'en tant qu'être humain créatif et artiste c'est le chemin que je dois poursuivre : m'ouvrir réellement à ce qui me gêne, ce qui me terrifie ou ce que j'ai pu détester auparavant."])</script><script>self.__next_f.push([1,"12:T6c1,"])</script><script>self.__next_f.push([1,"---\ntitle: \"Honneteté de l'interaction\"\ndate: \"2026-03-07\"\ndescription: \"Speculation sur ce que je represente dans un monde de plus en plus en besoin d'interation reele et fructifiante.\"\ntags: [\"introspection\"]\n---\n\nHonnêtement, c'est un peu bizarre.\n\nComme beaucoup de gens de ma génération, j'ai l'impression d'avoir une compréhension quand même acquise et pertinente de qui je suis, de ce que je représente, pour qui et comment.\nJe crois me comprendre, je crois être certain de pouvoir dire que je suis une personne à fort caractère mais douce, une personne à l'écoute des gens, toujours prête à aider quand il le faut et qui fait les efforts pour entretenir les relations qui lui tiennent à cœur.\n\nC'est ce que je pense représenter, enfin je l'espère, car dans le cadre de l'introspection on finit toujours par confondre la personne que l'on est avec la personne que l'on souhaite être.\nDans cette confusion on pourrait avancer dans le sens du « je souhaite en faire plus pour devenir réellement qui je suis ». Et à cela je réponds qu'il est souhaitable de ne pas se surmener; mais à une seule condition: que l'on soit honnête avec soi-même. En ce moment cette phrase est ma favorite: « Soyez honnêtes ». Car vous vous devez bien ça, vous devez bien ça à vos proches et j'irais même plus loin, vous le devez au monde car l'expérience que vous avez en interagissant avec lui est toujours honnête, peu importe la gravité de l'action; elle sera toujours réelle et ancrée. Accepter sa situation, aussi difficile soit-elle, est le meilleur moyen d'aller de l'avant car c'est assumer le monde devant nos yeux. Le monde nous assume d'une certaine façon et c'est à toi de perpétuer ce cycle."])</script><script>self.__next_f.push([1,"d:[\"$\",\"$Lf\",null,{\"diaries\":[{\"title\":\"How to Build a Next.js Blog\",\"slug\":\"2\",\"date\":\"2026-03-07T00:00:00.000Z\",\"content\":\"---\\ntitle: \\\"How to Build a Next.js Blog\\\"\\ndate: \\\"2026-03-07\\\"\\ndescription: \\\"A guide to using Markdown in Next.js\\\"\\ntags: [\\\"react\\\", \\\"nextjs\\\"]\\n---\\n\\nToday is a good day!\\n\\nI woke up in a great mood. I made myself sandwitches with ham/egg and mayonnaise on a really tasty bread.\\nAs I'm writting this, I'm working on the coding of this markdown page on which you are reading at this moment.\\nI'm perfectionistic guy so I lost about 1h choosing the colors of the code segment lmao \\n\\nSo this is how to do it:\\n\\n```ts\\n\\nimport { matter } from 'gray-matter'\\n\\nconst { data, content } = matter(fileContent);\\n\\nreturn {\\n    title: data.title || entryName,\\n    date: new Date(data.date),\\n    content,\\n};\\n\\n```\\n\\nwith your markdown file that needs to start like this:\\n\\n```ts\\n---\\ntitle: \\\"How to code a markdown metadata reader\\\"\\ndate: \\\"2026-03-07\\\"\\ndescription: \\\"A guide to using Markdown in Next.js\\\"\\ntags: [\\\"react\\\", \\\"nextjs\\\", 'markdown']\\n---\\n```\"},{\"title\":\"First time journaling \u0026 FEMTOGO\",\"slug\":\"1\",\"date\":\"2026-03-06T00:00:00.000Z\",\"content\":\"$10\"}],\"essays\":[{\"title\":\"Art et ouverture d'esprit\",\"slug\":\"art-et-ouverture-desprit\",\"date\":\"2026-03-08T00:00:00.000Z\",\"content\":\"$11\"},{\"title\":\"Honneteté de l'interaction\",\"slug\":\"personnal-monologue\",\"date\":\"2026-03-07T00:00:00.000Z\",\"content\":\"$12\"}]}]\n"])</script></body></html>
